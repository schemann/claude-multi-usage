name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Assemble app bundle (ad-hoc signed)
        run: make bundle IDENTITY="-"

      - name: Verify bundle contents
        run: |
          test -x ClaudeMultiUsage.app/Contents/MacOS/ClaudeMultiUsage
          test -d ClaudeMultiUsage.app/Contents/Resources/ClaudeMultiUsage_ClaudeMultiUsage.bundle
          for lang in en de fr it es; do
            test -f "ClaudeMultiUsage.app/Contents/Resources/ClaudeMultiUsage_ClaudeMultiUsage.bundle/$lang.lproj/Localizable.strings"
          done
          echo "Bundle OK"
